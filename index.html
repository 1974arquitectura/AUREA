<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<title>AUREA Desarrollos Inmobiliarios</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

  :root {
    --gold: #D4AF37;
    --gold-luminous: #E0C87A;
    --gold-dark: #B8962C;
    --card-base-width: 140px;
    --card-hover-width: 280px;
    --card-height: 480px;
    
    /* Paleta Soft Luxury / Mood Board */
    --bg-color: #FCFAF7;        /* Fondo general crema muy claro */
    --card-bg: #FFFFFF;          /* Tarjetas blancas puras */
    --text-primary: #2C2A2A;     /* Casi negro para títulos principales */
    --text-secondary: #6B6B6B;   /* Gris suave para descripciones */
    --text-label: #9B9B9B;       /* Gris claro para etiquetas estilo "Light Wood & Brass" */
    --border-color: #EFECE5;     /* Borde sutil */
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.02);
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.04);
    --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.06);
  }

  body { 
    font-family: 'Inter', sans-serif; 
    background: #0A0A0A; 
    overflow: hidden; 
    height: 100vh; 
    width: 100vw; 
    position: fixed; 
    top: 0; 
    left: 0; 
  }

  /* ========== HERO ========== */
  .hero-bg {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: url('assets/images/hero/hero-bg.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: 1;
    transition: filter 0.6s ease;
    filter: brightness(1) contrast(1.02);
  }
  .hero-bg.desenfocado { filter: brightness(0.4) blur(8px); }

  .global-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.25);
    backdrop-filter: blur(4px);
    z-index: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .global-overlay.visible { opacity: 1; }

  /* ========== SLICE 00 ========== */
  .banda-slice00 {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 29;
    transition: opacity 0.6s ease, visibility 0.6s ease;
    pointer-events: auto;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .banda-slice00.hide { opacity: 0; visibility: hidden; pointer-events: none; }

  .logo-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.8rem;
    flex-wrap: wrap;
    animation: fadeInUp 0.8s ease;
  }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

  .logo-img {
    width: 150px;
    height: 150px;
    object-fit: contain;
    filter: drop-shadow(0 4px 15px rgba(0,0,0,0.3));
    animation: pulseGold 2s infinite;
  }
  @keyframes pulseGold {
    0% { filter: drop-shadow(0 4px 15px rgba(0,0,0,0.3)) brightness(1); }
    50% { filter: drop-shadow(0 4px 15px rgba(0,0,0,0.4)) brightness(1.1); }
    100% { filter: drop-shadow(0 4px 15px rgba(0,0,0,0.3)) brightness(1); }
  }

  .logo-text h1 {
    font-size: 5.7rem;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    background: linear-gradient(135deg, #F2E2B0 0%, #D4AF37 40%, #FFF8E7 60%, #D4AF37 80%, #B8902C 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmer 4s linear infinite;
    margin: 0;
    letter-spacing: -0.02em;
  }
  .slogan {
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.25em;
    color: var(--gold-luminous);
    font-weight: 400;
    text-transform: uppercase;
    margin-top: 0.5rem;
    text-align: center;
    text-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  @keyframes shimmer { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }

  /* ========== TÍTULO FLOTANTE ========== */
  .slide-title-area {
    position: fixed;
    top: -100px;
    left: 0;
    width: 100%;
    text-align: center;
    z-index: 25;
    pointer-events: none;
    transition: top 0.4s ease, opacity 0.4s ease;
    opacity: 0;
    visibility: hidden;
  }
  .slide-title-area.visible { top: 1.5rem; opacity: 1; visibility: visible; }
  .current-slide-title {
    display: inline-block;
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-luminous);
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    padding: 0.3rem 1.5rem;
    border-radius: 40px;
  }

  /* ========== ESQUINAS ========== */
  .back-corner {
    position: fixed;
    top: 1rem;
    left: 1rem;
    z-index: 200;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    border-radius: 40px;
    padding: 0.5rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    transition: 0.3s;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .back-corner.visible { opacity: 1; visibility: visible; pointer-events: auto; }
  .back-corner i { color: var(--gold-luminous); font-size: 0.9rem; }
  .back-corner span { color: #D1CCC3; font-size: 0.75rem; font-family: 'Inter', sans-serif; letter-spacing: 0.05em;}

  .corner-logo {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 200;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    border-radius: 40px;
    padding: 0.4rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    transition: 0.3s;
  }
  .corner-logo-img { width: 28px; height: 28px; object-fit: contain; filter: brightness(0) invert(1);}
  .corner-logo span { font-size: 0.75rem; color: var(--gold-luminous); font-weight: 400; font-family: 'Inter', sans-serif; letter-spacing: 0.1em;}

  /* ========== ESCRITORIO ========== */
  @media (min-width: 769px) {
    .carousel-wrapper {
      position: fixed;
      bottom: 2rem;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      z-index: 20;
      overflow-x: auto;
      overflow-y: visible;
      scroll-behavior: smooth;
      padding: 1rem 0;
      cursor: grab;
      transform: translateX(100%);
      transition: transform 0.6s ease;
    }
    .carousel-wrapper:active { cursor: grabbing; }
    .carousel-wrapper.visible { transform: translateX(0); }
    .carousel-wrapper::-webkit-scrollbar { height: 4px; }
    .carousel-wrapper::-webkit-scrollbar-track { background: rgba(255,255,255,0.2); border-radius: 10px; }
    .carousel-wrapper::-webkit-scrollbar-thumb { background: var(--gold-luminous); border-radius: 10px; }
    
    .carousel-track {
      display: flex;
      gap: 1rem;
      align-items: flex-end;
      padding: 0 calc(50vw - 70px);
    }
    .carousel-card {
      flex-shrink: 0;
      width: var(--card-base-width);
      height: var(--card-height);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: width 0.4s ease, transform 0.4s ease, filter 0.3s ease;
      filter: brightness(0.85) blur(1px);
      box-shadow: var(--shadow-md);
      position: relative;
    }
    .carousel-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.2);
      z-index: 1;
      pointer-events: none;
      transition: background 0.3s ease;
    }
    .carousel-card:hover::before,
    .carousel-card.selected::before { background: rgba(0, 0, 0, 0); }
    .carousel-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: relative;
      z-index: 0;
    }
    .carousel-card:hover,
    .carousel-card.selected {
      width: var(--card-hover-width);
      filter: brightness(1) blur(0px);
      box-shadow: var(--shadow-lg);
      z-index: 10;
    }
    .carousel-card.push-left { transform: translateX(-30px); }
    .carousel-card.push-right { transform: translateX(30px); }
    
    .contact-button-mobile { display: none; }
    .instruction { bottom: 1.5rem; font-size: 0.75rem; }
  }

  /* ========== MÓVIL ========== */
  @media (max-width: 768px) {
    .logo-img { width: 100px; height: 100px; }
    .logo-text h1 { font-size: 3rem; }
    .slogan { font-size: 0.7rem; letter-spacing: 0.2em; }
    .slide-title-area.visible { top: 3rem; }
    .current-slide-title { font-size: 0.7rem; letter-spacing: 0.2em; padding: 0.2rem 1rem; }

    .carousel-wrapper {
      position: fixed;
      top: 6rem;
      bottom: auto;
      left: 0;
      width: 100%;
      height: calc(100vh - 7.5rem);
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0;
      cursor: default;
      z-index: 20;
      transform: translateX(-100%);
      transition: transform 0.6s ease;
    }
    .carousel-wrapper.visible { transform: translateX(0); }
    .carousel-track {
      display: flex;
      flex-direction: row !important;
      flex-wrap: wrap;
      gap: 16px;
      padding: 16px;
      justify-content: center;
    }
    .carousel-card {
      width: calc(50% - 16px) !important;
      min-width: 150px;
      height: auto !important;
      min-height: 280px;
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      filter: brightness(0.85) blur(1px);
      box-shadow: var(--shadow-sm);
      position: relative;
    }
    .carousel-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.2);
      z-index: 1;
      pointer-events: none;
    }
    .carousel-card.selected::before { background: rgba(0, 0, 0, 0); }
    .carousel-card.selected {
      border: 2px solid var(--gold-luminous);
      filter: brightness(1) blur(0px);
      transform: scale(1.01);
    }
    .carousel-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      position: relative;
      z-index: 0;
    }
    .card-mobile-info {
      padding: 0.6rem;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      text-align: center;
      border-radius: 0 0 20px 20px;
    }
    .card-mobile-info h3 { 
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: var(--gold-luminous);
      font-weight: 400;
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }
    .card-mobile-info p { 
      font-size: 0.65rem; 
      color: #C4C0B8;
      font-family: 'Inter', sans-serif;
    }
    
    .contact-button-mobile {
      position: fixed;
      bottom: 2rem;
      right: 1rem;
      width: 56px;
      height: 56px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .contact-button-mobile.visible { opacity: 1; visibility: visible; pointer-events: auto; }
    .contact-button-mobile i { font-size: 1.5rem; color: #1a1a1a; }
    .instruction { bottom: 0.8rem; font-size: 0.6rem; }
  }

  /* ========== DETALLE GENERAL - Estilo Mood Board ========== */
  .detail-screen {
    position: fixed;
    top: 0;
    right: 0;
    width: 100%;
    height: 100vh;
    background: var(--bg-color);
    z-index: 100;
    transform: translateX(100%);
    transition: transform 0.5s ease;
    overflow-y: auto;
  }
  .detail-screen.active { transform: translateX(0); }
  .detail-content { padding: 2rem; max-width: 1400px; margin: 0 auto; padding-top: 5rem; }
  
  .detail-header {
    margin-bottom: 2rem;
  }
  .detail-header h2 { 
    font-family: 'Cormorant Garamond', serif; 
    font-size: 2.5rem; 
    font-weight: 400;
    color: var(--text-primary); 
    border-bottom: 1px solid var(--border-color);
    display: inline-block;
    padding-bottom: 0.3rem;
    margin-bottom: 1rem;
    letter-spacing: -0.01em;
  }
  .detail-desc { 
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem; 
    line-height: 1.6; 
    color: var(--text-secondary); 
    background: transparent;
    padding: 0;
    border-radius: 0;
    margin-bottom: 2rem;
    max-width: 800px;
  }
  .detail-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 1rem; }
  .detail-gallery img { width: 100%; height: 260px; object-fit: cover; border-radius: 16px; cursor: pointer; transition: 0.3s; box-shadow: var(--shadow-sm); }
  .detail-gallery img:hover { transform: scale(1.01); box-shadow: var(--shadow-md); }

  .instruction {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 25;
    background: rgba(0,0,0,0.5);
    color: #D1CCC3;
    padding: 0.4rem 1.2rem;
    border-radius: 60px;
    font-size: 0.75rem;
    backdrop-filter: blur(8px);
    pointer-events: none;
    white-space: nowrap;
    transition: opacity 0.3s;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    letter-spacing: 0.05em;
  }
  .instruction.hide { opacity: 0; visibility: hidden; }

  .btn-close {
    background: transparent;
    border: 1px solid var(--border-color);
    padding: 0.6rem 1.8rem;
    border-radius: 40px;
    color: var(--text-primary);
    font-weight: 400;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 2rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }
  .btn-close:hover { background: var(--gold); color: white; border-color: var(--gold); transform: translateY(-2px);}

  /* ========== SUBNAVEGACIÓN ========== */
  .style-subnav {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
    padding-bottom: 0.5rem;
    justify-content: center;
    border-bottom: 1px solid var(--border-color);
  }
  .style-subnav button {
    background: transparent;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-label);
    padding: 0.5rem 0;
    cursor: pointer;
    transition: 0.3s;
    font-weight: 400;
  }
  .style-subnav button.active { 
    color: var(--gold-dark); 
    border-bottom: 2px solid var(--gold-dark);
  }
  .style-subnav button:hover { color: var(--gold-dark); }

  /* ========== INTRO ESTILOS ========== */
  .style-intro-wrapper {
    display: flex;
    gap: 3rem;
    flex-wrap: wrap;
    align-items: flex-start;
  }
  .style-intro-text {
    flex: 2;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    line-height: 1.65;
    color: var(--text-secondary);
    background: transparent;
    padding: 0;
    border-radius: 0;
    border-left: 2px solid var(--gold);
    padding-left: 1.5rem;
    font-style: normal;
  }
  .materials-grid {
    flex: 3;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.5rem;
  }
  .material-card {
    background: var(--card-bg);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.4s ease;
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm);
  }
  .material-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--gold);}
  .material-card img { width: 100%; height: 140px; object-fit: cover; }
  .material-card p { 
    padding: 0.8rem; 
    text-align: center; 
    color: var(--text-secondary); 
    font-size: 0.8rem; 
    font-weight: 400;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.03em;
  }

  @media (max-width: 768px) {
    .style-intro-wrapper { flex-direction: column; }
    .materials-grid { grid-template-columns: repeat(2, 1fr); }
    .material-card img { height: 100px; }
    .style-intro-text { font-size: 0.85rem; padding-left: 1rem; }
  }

  /* ========== EXTERIORES/INTERIORES ========== */
  .exterior-interior-wrapper {
    width: 100%;
    min-height: 70vh;
    display: flex;
    flex-direction: column;
  }
  .exterior-interior-header {
    margin-bottom: 2rem;
  }
  .exterior-interior-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 400;
    color: var(--text-primary);
    border-left: 2px solid var(--gold);
    padding-left: 1rem;
    margin-bottom: 0.5rem;
  }
  .exterior-interior-header p {
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    line-height: 1.6;
    color: var(--text-label);
    padding-left: 1rem;
  }
  .exterior-interior-carousel {
    width: 100%;
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-behavior: smooth;
    cursor: grab;
    padding-bottom: 0.5rem;
  }
  .exterior-interior-carousel:active { cursor: grabbing; }
  .exterior-interior-carousel::-webkit-scrollbar { height: 4px; }
  .exterior-interior-carousel::-webkit-scrollbar-track { background: var(--border-color); border-radius: 10px; }
  .exterior-interior-carousel::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
  .exterior-interior-track {
    display: flex;
    gap: 1.5rem;
    padding: 0.5rem 0.5rem 0.5rem 0;
    width: max-content;
    height: 100%;
    align-items: center;
  }
  .exterior-interior-card {
    flex-shrink: 0;
    width: 280px;
    height: 400px;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.4s ease;
    filter: brightness(0.99);
    box-shadow: var(--shadow-sm);
    position: relative;
    border: 1px solid var(--border-color);
  }
  .exterior-interior-card:hover {
    width: 340px;
    filter: brightness(1);
    z-index: 10;
    box-shadow: var(--shadow-lg);
    border-color: var(--gold);
  }
  .exterior-interior-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: relative;
    z-index: 0;
  }
  .exterior-interior-card .exterior-interior-caption {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
    padding: 1rem;
    text-align: center;
    z-index: 2;
  }
  .exterior-interior-card .exterior-interior-caption h4 {
    font-family: 'Inter', sans-serif;
    color: var(--gold-luminous);
    font-size: 0.9rem;
    font-weight: 400;
    letter-spacing: 0.05em;
  }
  .exterior-interior-card.push-left-exterior { transform: translateX(-30px); }
  .exterior-interior-card.push-right-exterior { transform: translateX(30px); }

  @media (max-width: 768px) {
    .exterior-interior-card {
      width: 220px;
      height: 340px;
    }
    .exterior-interior-card:hover {
      width: 220px;
      transform: scale(1.02);
    }
    .exterior-interior-card.push-left-exterior,
    .exterior-interior-card.push-right-exterior {
      transform: translateX(0);
    }
    .exterior-interior-header h2 { font-size: 1.5rem; }
    .exterior-interior-header p { font-size: 0.75rem; }
  }

  /* ========== IMAGEN DETALLE ========== */
  .image-detail-view-ratio {
    display: flex;
    gap: 2rem;
    min-height: 80vh;
    background: var(--card-bg);
    border-radius: 0;
    overflow: hidden;
    margin: 0;
  }
  .image-text-panel-ratio {
    flex: 1;
    max-width: 35%;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: var(--bg-color);
    border-radius: 0;
    overflow-y: auto;
  }
  .image-text-panel-ratio h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 400;
    color: var(--text-primary);
    border-left: 2px solid var(--gold);
    padding-left: 1rem;
    margin-bottom: 1rem;
  }
  .image-text-panel-ratio p {
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    line-height: 1.65;
    color: var(--text-secondary);
  }
  .image-panel-ratio {
    flex: 2;
    max-width: 65%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: var(--card-bg);
    min-height: 80vh;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
  }

  function getStyleDisplayName(styleId) {

      'minimalista': 'Minimalista',
      'internacional': 'Internacional'
    };

  function escapeHtml(str) { return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }

  function applyAccordionEffect(card, isHovering) {
    if (isMobile) return;
    const cards = document.querySelectorAll('.carousel-card');
    const index = Array.from(cards).indexOf(card);
    cards.forEach((c, i) => {
      c.classList.remove('push-left', 'push-right');
      if (isHovering && i < index) c.classList.add('push-left');
      else if (isHovering && i > index) c.classList.add('push-right');
    });
  }

  function updateSelectedByScroll() {
    if (!elements.carouselWrapper || !isExperienceActive) return;
    const cards = document.querySelectorAll('.carousel-card');
    if (cards.length === 0) return;
    let bestCard = null, bestDist = Infinity;
    if (!isMobile) {
      const center = elements.carouselWrapper.scrollLeft + elements.carouselWrapper.clientWidth / 2;
      cards.forEach(card => {
        const rect = card.getBoundingClientRect();
        const dist = Math.abs((rect.left + rect.width / 2) - center);
        if (dist < bestDist) { bestDist = dist; bestCard = card; }
      });
    }
    if (bestCard && !bestCard.classList.contains('selected')) {
      cards.forEach(c => c.classList.remove('selected'));
      bestCard.classList.add('selected');
      const id = bestCard.getAttribute('data-id');
      if (id) {
        currentSelectedId = id;
        const sec = secciones.find(s => s.id === id);
        if (sec && elements.currentTitle) elements.currentTitle.innerText = sec.titulo;
      }
    }
  }

  function selectCard(card, updateTitle = true) {
    if (!isExperienceActive) return;
    document.querySelectorAll('.carousel-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    if (updateTitle && elements.currentTitle) {
      const title = card.getAttribute('data-title');
      if (title) elements.currentTitle.innerText = title;
    }
    if (isMobile && elements.carouselWrapper) {
      const cardTop = card.offsetTop;
      const containerHeight = elements.carouselWrapper.clientHeight;
      const cardHeight = card.clientHeight;
      elements.carouselWrapper.scrollTo({ top: cardTop - (containerHeight / 2) + (cardHeight / 2), behavior: 'smooth' });
    }
  }

  function showImageDetail(imagesArray, index, styleId, section) {
    navigationStack.push({ type: 'image', styleId: styleId, section: section, index: index });
    let currentIndex = index;
    const totalImages = imagesArray.length;
    
    function updateImage() {
      const item = imagesArray[currentIndex];
      const titleEl = document.getElementById('imageTitle');
      const descEl = document.getElementById('imageDesc');
      const mainImage = document.getElementById('mainDetailImage');
      if (titleEl) titleEl.textContent = item.title || item.name;
      if (descEl) descEl.textContent = item.desc || 'Detalle arquitectónico';
      if (mainImage) {
        mainImage.src = item.img;
        mainImage.classList.remove('zoomed');
        mainImage.style.transform = '';
      }
      const counter = document.getElementById('imageCounter');
      if (counter) counter.textContent = `${currentIndex + 1} / ${totalImages}`;
    }
    
    elements.detailContent.innerHTML = `
      <div class="image-detail-view-ratio" id="imageDetailContainer">
        <div class="image-text-panel-ratio">
          <h2 id="imageTitle">${escapeHtml(imagesArray[currentIndex].title || imagesArray[currentIndex].name)}</h2>
          <p id="imageDesc">${escapeHtml(imagesArray[currentIndex].desc || 'Detalle arquitectónico')}</p>
        </div>
        <div class="image-panel-ratio" id="imagePanel">
          <img id="mainDetailImage" src="${imagesArray[currentIndex].img}" onerror="this.src='https://placehold.co/800x600?text=Imagen'">
        </div>
      </div>
      <div class="image-nav-buttons">
        <button class="btn-close" id="navPrevBtn"><i class="fas fa-chevron-left"></i> Anterior</button>
        <button class="btn-close" id="navBackBtn"><i class="fas fa-arrow-left"></i> Volver</button>
        <button class="btn-close" id="navNextBtn">Siguiente <i class="fas fa-chevron-right"></i></button>
        <button class="btn-close" id="zoomResetBtn"><i class="fas fa-search-plus"></i> Reset Zoom</button>
      </div>
      <div id="imageCounter" style="text-align:center; margin-top:0.5rem; font-size:0.7rem; color:var(--text-label);">${currentIndex + 1} / ${totalImages}</div>
    `;
    
    const container = document.getElementById('imageDetailContainer');
    const mainImage = document.getElementById('mainDetailImage');
    
    let initialDistance = 0;
    let currentScale = 1;
    
    if (mainImage && isMobile) {
      mainImage.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
          e.preventDefault();
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          initialDistance = Math.hypot(dx, dy);
        }
      });
      
      mainImage.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2 && initialDistance > 0) {
          e.preventDefault();
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          const newDistance = Math.hypot(dx, dy);
          const scale = newDistance / initialDistance;
          currentScale = Math.min(Math.max(scale, 1), 3);
          
          if (currentScale > 1) {
            mainImage.style.transform = `scale(${currentScale})`;
            mainImage.style.transformOrigin = 'center center';
            mainImage.classList.add('zoomed');
          } else {
            mainImage.style.transform = '';
            mainImage.classList.remove('zoomed');
          }
        }
      });
      
      mainImage.addEventListener('touchend', () => {
        initialDistance = 0;
      });
      
      let lastTap = 0;
      mainImage.addEventListener('click', (e) => {
        if (isMobile) {
          const now = Date.now();
          if (now - lastTap < 300) {
            e.preventDefault();
            if (mainImage.classList.contains('zoomed')) {
              mainImage.style.transform = '';
              mainImage.classList.remove('zoomed');
              currentScale = 1;
            } else {
              mainImage.style.transform = 'scale(2)';
              mainImage.classList.add('zoomed');
              currentScale = 2;
            }
          }
          lastTap = now;
        }
      });
    }
    
    document.getElementById('zoomResetBtn')?.addEventListener('click', () => {
      if (mainImage) {
        mainImage.style.transform = '';
        mainImage.classList.remove('zoomed');
        currentScale = 1;
      }
    });
    
    const goPrev = () => { if (currentIndex > 0) { currentIndex--; updateImage(); } };
    const goNext = () => { if (currentIndex < totalImages - 1) { currentIndex++; updateImage(); } };
    
    document.getElementById('navPrevBtn')?.addEventListener('click', goPrev);
    document.getElementById('navNextBtn')?.addEventListener('click', goNext);
    document.getElementById('navBackBtn')?.addEventListener('click', () => goBack());
    
    if (container && !isMobile) {
      container.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (e.deltaY > 0) goNext();
        else goPrev();
      }, { passive: false });
    }
  }

        const allCards = document.querySelectorAll('.exterior-interior-card');
        const index = Array.from(allCards).indexOf(card);
        allCards.forEach((c, i) => {
          c.classList.remove('push-left-exterior', 'push-right-exterior');
          if (isHovering && i < index) c.classList.add('push-left-exterior');
          else if (isHovering && i > index) c.classList.add('push-right-exterior');
        });
      }
      
      if (carousel) {
        carousel.addEventListener('wheel', (e) => { e.preventDefault(); carousel.scrollLeft += e.deltaY; }, { passive: false });
      }
      
      cards.forEach(card => {
        card.addEventListener('mouseenter', () => { if (!isMobile) applyAccordion(card, true); });
        card.addEventListener('mouseleave', () => { if (!isMobile) applyAccordion(card, false); });
      });
    }, 50);
  }

  function openProgramaDetail() {

        <div class="estilos-carousel-track" id="estilosCarouselTrack">

      card.addEventListener('click', () => openStyleDetail(card.getAttribute('data-style'), 'intro'));

  function openTecnicaDetail() {
    navigationStack = [];
    let currentStyle = 'neoclasico';
    let isAnimating = false;
    
    function getStyleImages(style) {
      return {
        isometrico: `assets/images/tecnica/isometrico-${style}.png`,
        planta: `assets/images/tecnica/planta-${style}.png`
      };
    }
    
    function renderTecnica() {
      const images = getStyleImages(currentStyle);
      const styleDisplayName = getStyleDisplayName(currentStyle);
      elements.detailContent.innerHTML = `
        <div class="detail-header"><h2>Documentación Técnica</h2></div>
        <div class="detail-desc">Un mismo programa, cuatro almas diferentes. La casa crece en cinco etapas armónicas.</div>
        <div class="tecnica-layout">
          <div class="tecnica-izquierda">
            <div class="tecnica-estilos-carousel" id="tecnicaEstilosCarousel">
              <div class="tecnica-estilos-track">
                ${estilosLista.map(estilo => `
                  <div class="tecnica-estilo-card ${estilo.id === currentStyle ? 'active' : ''}" data-style="${estilo.id}">
                    <img src="${estilo.img}" onerror="this.src='https://placehold.co/400x600?text=${estilo.name}'">
                    <div class="tecnica-estilo-caption">
                      <h4>${estilo.name}</h4>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
          <div class="tecnica-derecha">
            <div class="tecnica-scroll-container" id="tecnicaScrollContainer">
              <div class="tecnica-scroll-content" id="tecnicaScrollContent">
                <div class="tecnica-imagen isometrico">
                  <h4>Isometric View</h4>
                  <img id="isometricoImg" src="${images.isometrico}" onerror="this.src='https://placehold.co/800x600?text=Isometric'">
                </div>
                <div class="tecnica-imagen planta">
                  <h4>Floor Plan</h4>
                  <img id="plantaImg" src="${images.planta}" onerror="this.src='https://placehold.co/800x600?text=Plan'">
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
      
      const tecCarousel = document.getElementById('tecnicaEstilosCarousel');
      if (tecCarousel) {
        tecCarousel.addEventListener('wheel', (e) => { e.preventDefault(); tecCarousel.scrollLeft += e.deltaY; }, { passive: false });
      }
      
      const styleCards = document.querySelectorAll('.tecnica-estilo-card');
      styleCards.forEach(card => {
        card.addEventListener('click', () => {
          if (isAnimating) return;
          const newStyle = card.getAttribute('data-style');
          if (newStyle === currentStyle) return;
          
          isAnimating = true;
          styleCards.forEach(c => c.classList.remove('active'));
          card.classList.add('active');
          
          const newImages = getStyleImages(newStyle);
          const isometricoImg = document.getElementById('isometricoImg');
          const plantaImg = document.getElementById('plantaImg');
          
          if (isometricoImg) isometricoImg.src = newImages.isometrico;
          if (plantaImg) plantaImg.src = newImages.planta;
          
          currentStyle = newStyle;
          setTimeout(() => { isAnimating = false; }, 300);
        });
      });
    }
    renderTecnica();
  }

  function openContactoDetail() {
    navigationStack = [];
    elements.detailContent.innerHTML = `
      <div class="detail-header"><h2>Contacto</h2></div>
      <div class="detail-desc">¿Soñamos juntos? Contanos cuál de los cuatro estilos resuena con tu forma de vivir.</div>
      <div class="info-grid">
        <div class="info-card">
          <img src="assets/images/contacto/oficina.jpg" onerror="this.src='https://placehold.co/800x600?text=Email'">
          <div class="info-card-content">
            <h4>Email</h4>
            <p>info@aureadesarrollosinmobiliarios.com</p>
          </div>
        </div>
        <div class="info-card">
          <img src="assets/images/contacto/equipo.jpg" onerror="this.src='https://placehold.co/800x600?text=Teléfono'">
          <div class="info-card-content">
            <h4>Teléfono</h4>
            <p>02954 829221</p>
          </div>
        </div>
      </div>
      <div style="text-align: center; margin-top: 2rem; font-family: 'Inter', sans-serif; font-size: 0.8rem; color: var(--text-label);">
        Construimos más que casas. Construimos un lugar al que quieras volver siempre.
      </div>
    `;
  }

  function openDetail(id) {
    if (!isExperienceActive) return;
    elements.slideTitle.classList.add('hide-title');
    elements.carouselWrapper.classList.add('hiding');
    elements.instruction.classList.add('hide');
    setTimeout(() => {
      if (id === 'proyecto') openProyectoDetail();
      else if (id === 'programa') openProgramaDetail();
      else if (id === 'estilos') openEstilosDetail();
      else if (id === 'tecnica') openTecnicaDetail();
      else if (id === 'contacto') openContactoDetail();
      elements.detailScreen.classList.add('active');
      elements.backCorner.classList.add('visible');
    }, 500);
  }

  function goBack() {
    if (navigationStack.length > 0) {
      const last = navigationStack.pop();
      if (last.type === 'image') openStyleDetail(last.styleId, last.section);
      else if (last.type === 'style') openEstilosDetail();
      else closeDetail();
    } else {
      closeDetail();
    }
    showTitle();
  }

  function closeDetail() {
    elements.detailScreen.classList.remove('active');
    elements.carouselWrapper.classList.remove('hiding');
    elements.slideTitle.classList.remove('hide-title');
    elements.instruction.classList.remove('hide');
    elements.backCorner.classList.remove('visible');
    setTimeout(() => updateSelectedByScroll(), 100);
  }

  function showTitle() { elements.slideTitle.classList.remove('hide-title'); }

  function rebuildCarousel() {
    if (!elements.carouselTrack) return;
    elements.carouselTrack.innerHTML = '';
    
    secciones.forEach((sec) => {
      const card = document.createElement('div');
      card.className = 'carousel-card';
      card.setAttribute('data-id', sec.id);
      card.setAttribute('data-title', sec.titulo);
      
      const img = document.createElement('img');
      img.src = sec.thumb;
      img.alt = sec.nombre;
      img.loading = 'lazy';
      img.onerror = () => { img.src = 'https://placehold.co/400x500?text=' + sec.nombre; };
      card.appendChild(img);
      
      if (isMobile) {
        const infoDiv = document.createElement('div');
        infoDiv.className = 'card-mobile-info';
        infoDiv.innerHTML = `<h3>${escapeHtml(sec.nombre)}</h3><p>${escapeHtml(sec.titulo)}</p>`;
        card.appendChild(infoDiv);
      }
      
      if (!isMobile) {
        card.addEventListener('mouseenter', () => {
          if (isExperienceActive) {
            const title = card.getAttribute('data-title');
            if (title && elements.currentTitle) elements.currentTitle.innerText = title;
            applyAccordionEffect(card, true);
            activeHoverCard = card;
          }
        });
        card.addEventListener('mouseleave', () => {
          if (isExperienceActive) {
            const selectedCard = document.querySelector('.carousel-card.selected');
            if (selectedCard && elements.currentTitle) {
              const selectedTitle = selectedCard.getAttribute('data-title');
              if (selectedTitle) elements.currentTitle.innerText = selectedTitle;
            } else {
              if (elements.currentTitle) elements.currentTitle.innerText = 'COLECCIÓN PRINCIPAL';
            }
            applyAccordionEffect(card, false);
            activeHoverCard = null;
          }
        });
      }
      
      card.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!isExperienceActive) return;
        document.querySelectorAll('.carousel-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        currentSelectedId = card.dataset.id;
        if (elements.currentTitle) elements.currentTitle.innerText = card.getAttribute('data-title');
        openDetail(card.dataset.id);
      });
      
      elements.carouselTrack.appendChild(card);
    });
    
    if (elements.currentTitle) elements.currentTitle.innerText = 'COLECCIÓN PRINCIPAL';
  }

  function setupScrollDetection() {
    if (!elements.carouselWrapper) return;
    let ticking = false;
    elements.carouselWrapper.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => { updateSelectedByScroll(); ticking = false; });
        ticking = true;
      }
    });
  }

  function startExperience() {
    if (isTransitioning || isExperienceActive) return;
    isTransitioning = true;
    elements.welcome.classList.add('hide');
    elements.heroBg.classList.add('desenfocado');
    elements.globalOverlay.classList.add('visible');
    
    setTimeout(() => {
      elements.carouselWrapper.classList.add('visible');
      if (isMobile && elements.contactMobile) elements.contactMobile.classList.add('visible');
    }, 500);
    
    setTimeout(() => elements.slideTitle.classList.add('visible'), 900);
    elements.instruction.classList.add('hide');
    
    setTimeout(() => {
      isExperienceActive = true;
      isTransitioning = false;
    }, 1600);
  }

  function resetToWelcome() {
    if (isTransitioning) return;
    isTransitioning = true;
    if (elements.detailScreen.classList.contains('active')) elements.detailScreen.classList.remove('active');
    if (elements.carouselWrapper) { 
      if (!isMobile) elements.carouselWrapper.scrollLeft = 0;
      else elements.carouselWrapper.scrollTop = 0;
    }
    isExperienceActive = false;
    elements.welcome.classList.remove('hide');
    elements.heroBg.classList.remove('desenfocado');
    elements.globalOverlay.classList.remove('visible');
    elements.carouselWrapper.classList.remove('visible');
    elements.slideTitle.classList.remove('visible');
    elements.instruction.classList.remove('hide');
    if (elements.contactMobile) elements.contactMobile.classList.remove('visible');
    if (elements.currentTitle) elements.currentTitle.innerText = 'COLECCIÓN PRINCIPAL';
    elements.backCorner.classList.remove('visible');
    if (!isMobile && activeHoverCard) { applyAccordionEffect(activeHoverCard, false); activeHoverCard = null; }
    setTimeout(() => { isTransitioning = false; }, 1600);
  }

  function init() {
    if (elements.heroBg) { elements.heroBg.classList.remove('desenfocado'); }
    rebuildCarousel();
    setupScrollDetection();
    if (elements.welcome) elements.welcome.addEventListener('click', startExperience);
    if (elements.cornerLogo) elements.cornerLogo.addEventListener('click', (e) => { e.stopPropagation(); resetToWelcome(); });
    if (elements.backCorner) elements.backCorner.addEventListener('click', () => goBack());
    if (elements.contactMobile) elements.contactMobile.addEventListener('click', () => { if (isExperienceActive) openDetail('contacto'); });
    if (elements.carouselWrapper && !isMobile) {
      elements.carouselWrapper.addEventListener('wheel', (e) => {
        if (isExperienceActive) { e.preventDefault(); elements.carouselWrapper.scrollLeft += e.deltaY; }
      }, { passive: false });
    }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
